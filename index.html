<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#10b981">
<title>家族の献立プランナー</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="献立">
<style>
:root{
  --g:#10b981; --g2:#059669; --g-light:#d1fae5; --g-bg:#ecfdf5;
  --o:#f59e0b; --o-light:#fef3c7;
  --r:#ef4444; --r-light:#fee2e2;
  --b:#3b82f6; --b-light:#dbeafe;
  --gray:#6b7280; --gray-light:#f3f4f6; --gray-border:#e5e7eb;
  --text:#111827; --text-sub:#4b5563;
  --bg:#f9fafb; --card:#fff;
  --radius:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;font-size:15px;line-height:1.5}
body{padding-bottom:80px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;padding:0}
input,select,textarea{font-family:inherit;font-size:16px}

/* Header */
header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,var(--g) 0%,var(--g2) 100%);color:#fff;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
header h1{margin:0;font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
header .sub{font-size:11px;opacity:.9;margin-top:2px}

/* Main */
main{padding:12px}
.view{display:none}
.view.active{display:block}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{margin:0 0 10px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}

/* Week tabs */
.week-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.week-tabs::-webkit-scrollbar{display:none}
.week-tab{flex-shrink:0;min-width:64px;padding:10px 8px;border-radius:10px;background:var(--gray-light);text-align:center;border:2px solid transparent}
.week-tab.active{background:var(--g);color:#fff;border-color:var(--g)}
.week-tab.weekend{background:var(--o-light);color:var(--o)}
.week-tab.weekend.active{background:var(--o);color:#fff;border-color:var(--o)}
.week-tab .date{font-size:10px;opacity:.8;line-height:1;margin-bottom:2px}
.week-tab .day{font-size:14px;font-weight:700}
.week-tab .kcal{font-size:10px;opacity:.85;margin-top:2px}
.week-tab.today{outline:2px solid #ef4444;outline-offset:-2px}
.week-tab{position:relative}

.today-banner{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;padding:10px 14px;border-radius:10px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(239,68,68,.25)}
.today-banner .tb-l{display:flex;align-items:center;gap:8px}
.today-banner .tb-date{font-size:18px;font-weight:800;line-height:1}
.today-banner .tb-sub{font-size:11px;opacity:.9;margin-top:2px}
.today-banner .tb-jump{background:rgba(255,255,255,.22);padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;color:#fff}
.today-banner .tb-jump:active{background:rgba(255,255,255,.4)}

.month-tab .mt-range{font-size:9px;opacity:.75;margin-top:2px;line-height:1}

/* Month tabs */
.month-tabs{display:flex;gap:6px;margin-bottom:12px}
.month-tab{flex:1;padding:10px;border-radius:10px;background:var(--gray-light);text-align:center;font-size:12px;font-weight:600}
.month-tab.active{background:var(--g);color:#fff}

/* Meal */
.meal-card{border:2px solid var(--g);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;background:#fff}
.meal-card.weekend{border-color:var(--o)}
.meal-head{background:var(--g);color:#fff;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px}
.meal-card.weekend .meal-head{background:var(--o)}
.meal-body{padding:12px}
.meal-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--gray-border)}
.meal-row:last-child{border-bottom:none}
.meal-row .left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.tag{display:inline-block;padding:3px 7px;border-radius:6px;font-size:11px;font-weight:600;flex-shrink:0}
.tag-main{background:var(--r-light);color:var(--r)}
.tag-sub{background:var(--g-light);color:var(--g2)}
.tag-soup{background:var(--b-light);color:var(--b)}
.tag-hc-l{background:#fed7aa;color:#c2410c;font-size:10px}
.tag-hc-s{background:#fde68a;color:#a16207;font-size:10px}
.meal-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meal-actions{display:flex;gap:4px}
.icon-btn{width:30px;height:30px;border-radius:8px;background:var(--gray-light);display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.pfc{display:flex;gap:10px;font-size:11px;color:var(--text-sub);padding:8px 0 0;flex-wrap:wrap}
.pfc span::before{content:"●";margin-right:3px}
.pfc .p::before{color:var(--b)}
.pfc .f::before{color:var(--o)}
.pfc .c::before{color:var(--g)}

/* Inventory */
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-row input{flex:1;padding:10px 12px;border:2px solid var(--gray-border);border-radius:10px;outline:none}
.input-row input:focus{border-color:var(--g)}
.input-row button{padding:10px 18px;background:var(--g);color:#fff;border-radius:10px;font-weight:700}

.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:20px;background:var(--gray-light);font-size:13px;border:1px solid var(--gray-border)}
.chip.expire-soon{background:var(--r-light);border-color:var(--r);color:var(--r)}
.chip.expire-warn{background:var(--o-light);border-color:var(--o);color:var(--o)}
.chip .x{margin-left:4px;opacity:.6;cursor:pointer}
.chip .expire-label{font-size:10px;background:#fff;padding:1px 5px;border-radius:8px;margin-left:2px;font-weight:600}

.quick-input{background:var(--g-bg);border-radius:10px;padding:10px;margin-bottom:10px}
.quick-head{font-size:13px;font-weight:600;color:var(--g2);margin-bottom:6px}
.quick-cats{display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;padding-bottom:2px}
.quick-cat{flex-shrink:0;padding:5px 10px;border-radius:20px;background:#fff;font-size:12px;border:1px solid var(--gray-border)}
.quick-cat.active{background:var(--g);color:#fff;border-color:var(--g)}
.quick-items{display:flex;flex-wrap:wrap;gap:4px}
.quick-item{padding:5px 10px;border-radius:20px;background:#fff;font-size:12px;border:1px solid var(--r-light);color:var(--r)}
.quick-item.in-stock{background:var(--g-light);color:var(--g2);border-color:var(--g)}

/* 在庫: 数量カード式 */
.inv-search{margin-bottom:10px}
.inv-search input{width:100%;padding:10px 14px;border:1.5px solid var(--gray-border);border-radius:10px;outline:none;font-size:14px;background:#fff}
.inv-search input:focus{border-color:var(--g)}
.inv-summary{display:flex;gap:14px;font-size:13px;color:var(--text-sub);margin-bottom:10px;padding:0 4px}
.cat-group{margin-bottom:14px;background:#fff;border-radius:10px;padding:10px 10px 12px;border:1px solid var(--gray-border)}
.cat-head{font-weight:700;font-size:14px;margin-bottom:10px}
.cat-count{color:var(--text-sub);font-weight:400;font-size:12px;margin-left:4px}
.inv-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:8px}
.inv-card{position:relative;background:#fff;border:2px solid var(--o);border-radius:12px;padding:10px 8px 8px;text-align:center}
.inv-card.qty-zero{border-color:#fca5a5;background:#fef2f2;opacity:.85}
.inv-card.refill-on{border-color:var(--o);background:#fff7ed}
.inv-del{position:absolute;top:4px;right:4px;background:transparent;border:none;color:#9ca3af;font-size:16px;line-height:1;padding:2px 6px;cursor:pointer}
.inv-name{font-size:12px;font-weight:600;margin-bottom:6px;margin-top:2px;line-height:1.2;word-break:break-all;padding-right:14px}
.inv-qty{font-size:24px;font-weight:800;color:var(--o2);line-height:1;margin-bottom:6px}
.inv-card.qty-zero .inv-qty{color:#dc2626}
.inv-pm{display:flex;gap:4px;margin-bottom:6px}
.pm-btn{flex:1;padding:5px 0;border:1px solid var(--gray-border);border-radius:6px;background:#fff;font-weight:700;font-size:14px;cursor:pointer;line-height:1}
.pm-btn.pm-plus{background:var(--g);color:#fff;border-color:var(--g)}
.inv-refill{width:100%;padding:5px 0;border:1px solid var(--o);background:#fff;color:var(--o2);border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.inv-refill.on{background:var(--o);color:#fff}
.quick-title{font-size:12px;color:var(--text-sub);margin:10px 0 6px}
.quick-items-inv{display:flex;flex-wrap:wrap;gap:4px}
.quick-chip{padding:5px 10px;border-radius:16px;background:#fff;font-size:12px;border:1px solid var(--gray-border);cursor:pointer;color:var(--text);user-select:none}
.quick-chip.in-stock{background:var(--g-light);color:var(--g2);border-color:var(--g)}
#inv-cat-sel{padding:10px 6px;border:2px solid var(--gray-border);border-radius:10px;background:#fff;font-size:13px}

/* Bottom nav */
nav.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-border);display:flex;padding:6px 4px 10px;z-index:20}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--gray);font-size:10px;font-weight:600}
.nav-btn.active{color:var(--g)}
.nav-btn .ic{font-size:22px;line-height:1}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:#fff;width:100%;max-height:90vh;border-radius:20px 20px 0 0;overflow-y:auto;padding:20px;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-head h3{margin:0;font-size:18px}
.modal-close{width:34px;height:34px;border-radius:50%;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:18px}

.recipe-hero{background:linear-gradient(135deg,var(--g) 0%,var(--g2) 100%);color:#fff;margin:-20px -20px 16px;padding:24px 20px;text-align:center;border-radius:20px 20px 0 0}
.recipe-hero .emoji{font-size:48px;display:block;margin-bottom:6px}
.recipe-hero h3{margin:0;font-size:20px}
.recipe-meta{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.recipe-meta .mtag{background:rgba(255,255,255,.25);padding:4px 10px;border-radius:12px;font-size:11px}

.section{margin-bottom:16px}
.section h4{margin:0 0 8px;font-size:14px;font-weight:700;color:var(--g2);display:flex;align-items:center;gap:6px}
.callout{border-radius:10px;padding:10px 12px;margin-bottom:8px}
.callout-kid{background:var(--o-light);border-left:4px solid var(--o)}
.callout-veg{background:var(--g-bg);border-left:4px solid var(--g)}
.callout-hc{background:#fef3c7;border-left:4px solid #f59e0b}
.callout-title{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.callout-body{font-size:13px;color:var(--text-sub)}

.ing-list{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ing-item{background:var(--gray-light);border-radius:8px;padding:8px 10px;font-size:12px;display:flex;justify-content:space-between;gap:6px}
.ing-item .n{font-weight:600}
.ing-item .a{color:var(--gray)}

.step{display:flex;gap:10px;padding:8px 0;border-bottom:1px dashed var(--gray-border)}
.step:last-child{border-bottom:none}
.step-num{width:26px;height:26px;background:var(--g-light);color:var(--g2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;font-size:13px}
.step-body{font-size:13px;padding-top:2px}

/* Shopping list */
.shop-cat{margin-bottom:14px}
.shop-cat h3{margin:0 0 6px;font-size:14px;border-bottom:2px solid var(--g);padding-bottom:4px;display:flex;align-items:center;gap:6px}
.shop-item{display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px dashed var(--gray-border);font-size:13px}
.shop-item.have{color:var(--gray);text-decoration:line-through}
.shop-item .amt{color:var(--gray)}
.shop-item.have .amt{color:var(--gray)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:10px;font-weight:700;font-size:13px}
.btn-pri{background:var(--g);color:#fff}
.btn-sec{background:var(--gray-light);color:var(--text)}
.btn-warn{background:var(--o-light);color:var(--o)}
.btn-full{width:100%;padding:12px}
.btn-row{display:flex;gap:8px;margin-top:10px}

/* Recipe list */
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.recipe-tile{background:#fff;border:1px solid var(--gray-border);border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer}
.recipe-tile .rt-emoji{font-size:32px;display:block;margin-bottom:4px}
.recipe-tile .rt-name{font-size:12px;font-weight:600;margin-bottom:4px}
.recipe-tile .rt-tags{font-size:10px;color:var(--gray)}
.filter-row{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;padding:6px 12px;border-radius:20px;background:var(--gray-light);font-size:12px;border:1px solid transparent}
.fchip.active{background:var(--g);color:#fff;border-color:var(--g)}

/* Feedback */
.fb-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px dashed var(--gray-border)}
.fb-row:last-child{border-bottom:none}
.fb-btns{display:flex;gap:6px}
.fb-btn{padding:4px 10px;border-radius:8px;font-size:11px;background:var(--gray-light);border:1px solid var(--gray-border)}
.fb-btn.sel-good{background:var(--g-light);border-color:var(--g);color:var(--g2)}
.fb-btn.sel-bad{background:var(--r-light);border-color:var(--r);color:var(--r)}

.bar{height:6px;background:var(--gray-light);border-radius:3px;overflow:hidden;display:flex;margin:6px 0 0}
.bar .seg{height:100%}
.bar .bp{background:var(--b)}
.bar .bf{background:var(--o)}
.bar .bc{background:var(--g)}

.empty{text-align:center;color:var(--gray);padding:30px 10px;font-size:13px}
.header-btn{background:rgba(255,255,255,.2);padding:6px 10px;border-radius:8px;font-size:12px;font-weight:700;color:#fff}
.header-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
details.sim{background:var(--gray-light);border-radius:10px;padding:10px;margin-top:8px}
details.sim summary{font-size:13px;font-weight:600;cursor:pointer}
details.sim[open] summary{margin-bottom:8px}
.note{font-size:11px;color:var(--gray);margin-top:4px}

/* Gantt */
.gantt{margin-top:8px;background:#fff;border-radius:8px;padding:10px}
.gantt-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.gantt-label{width:58px;font-size:10px;font-weight:700;color:var(--text-sub);flex-shrink:0;text-align:right}
.gantt-track{flex:1;position:relative;height:26px;background:#f3f4f6;border-radius:5px;overflow:hidden}
.gantt-bar{position:absolute;height:100%;display:flex;align-items:center;padding:0 4px;font-size:10px;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;border-radius:5px}
.gantt-prep{background:repeating-linear-gradient(45deg,#fbbf24,#fbbf24 4px,#f59e0b 4px,#f59e0b 8px);color:#78350f}
.gantt-cook-l{background:linear-gradient(90deg,#f97316,#ea580c)}
.gantt-cook-s{background:linear-gradient(90deg,#eab308,#ca8a04)}
.gantt-cook-g{background:linear-gradient(90deg,#64748b,#475569)}
.gantt-timeline{display:flex;justify-content:space-between;font-size:9px;color:var(--gray);margin-top:6px;padding-left:64px;padding-right:4px}
.gantt-total{font-weight:700;color:var(--g2);font-size:13px;margin-top:4px;text-align:right}

.sched-legend{display:flex;gap:8px;font-size:10px;color:var(--text-sub);margin-top:8px;flex-wrap:wrap}
.sched-legend .lg{display:inline-flex;align-items:center;gap:3px}
.sched-legend .sw{width:12px;height:12px;border-radius:3px}

.seq{margin-top:10px;border-left:2px solid var(--g-light);padding-left:0;margin-left:4px}
.seq-row{display:flex;gap:8px;align-items:center;padding:6px 0 6px 10px;position:relative;font-size:12px}
.seq-row::before{content:"";position:absolute;left:-5px;top:50%;width:8px;height:8px;border-radius:50%;background:var(--g);transform:translateY(-50%)}
.seq-row.done::before{background:var(--g2)}
.seq-row.start::before{background:#f97316}
.seq-time{font-weight:700;color:var(--g2);min-width:40px;font-variant-numeric:tabular-nums}
.seq-icon{font-size:14px}
.seq-text{flex:1}
.seq-text b{font-weight:700}
.seq-note{font-size:10px;color:var(--gray);margin-top:2px}

.opt-tip{background:var(--o-light);border-left:3px solid var(--o);padding:8px 10px;border-radius:6px;font-size:11px;color:#78350f;margin-top:8px;line-height:1.4}
.opt-tip strong{display:block;margin-bottom:2px}

/* Day memo / extras */
.day-memo{margin-top:14px;background:var(--g-bg);border-radius:10px;padding:12px;border-left:3px solid var(--g)}
.memo-head{font-size:13px;font-weight:700;color:var(--g2);margin-bottom:8px;display:flex;align-items:center;gap:4px;justify-content:space-between}
.memo-head .cnt{font-size:10px;background:var(--g);color:#fff;padding:2px 6px;border-radius:10px;font-weight:700}
.memo-input{width:100%;min-height:44px;padding:8px 10px;border:1px solid var(--gray-border);border-radius:8px;background:#fff;font-size:12px;outline:none;resize:vertical;font-family:inherit;box-sizing:border-box}
.memo-input:focus{border-color:var(--g)}
.extras-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.extra-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:#fff;border-radius:14px;font-size:11px;border:1px solid var(--g);color:var(--g2)}
.extra-chip .amt{color:var(--gray);font-weight:400}
.extra-chip .cat-ic{font-size:11px}
.extra-chip .x{margin-left:3px;cursor:pointer;opacity:.5;font-size:13px;line-height:1;font-weight:700}
.extra-chip .x:hover{opacity:1}
.extra-add{display:flex;gap:4px;margin-top:8px}
.extra-add input{padding:7px 8px;border:1px solid var(--gray-border);border-radius:6px;font-size:13px;outline:none;background:#fff;min-width:0}
.extra-add .n-inp{flex:2}
.extra-add .a-inp{flex:1}
.extra-add button{padding:7px 12px;background:var(--g);color:#fff;border-radius:6px;font-weight:700;font-size:12px;flex-shrink:0}
.memo-tip{font-size:10px;color:var(--gray);margin-top:6px;line-height:1.4}

.shop-item .day-badge{display:inline-block;font-size:9px;background:var(--o);color:#fff;padding:1px 5px;border-radius:8px;margin-right:4px;font-weight:700;vertical-align:middle}
.shop-item.extra-item{background:#fffbeb;padding:8px 10px;border-radius:6px;margin:3px 0;border:1px dashed var(--o-light)}
.shop-section-title{font-size:11px;color:var(--o);margin-top:10px;margin-bottom:4px;font-weight:700}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>🍱 家族の献立プランナー</h1>
      <div style="font-size:10px;opacity:.7;margin-top:2px">v22</div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="header-btn" id="btn-3days" title="在庫にある食材優先で月〜水の3日分を作成">🎯 在庫で3日</button>
      <button class="header-btn" id="btn-regen">🔄 再作成</button>
    </div>
  </div>
</header>

<main>

/* ==============================
   ユーティリティ
   ============================== */
const DAYS = ['月','火','水','木','金','土','日'];
const DAY_KEY = ['mon','tue','wed','thu','fri','sat','sun'];
const TODAY = new Date();

// 今週の月曜日（今日を含む週の月曜）を返す
function getThisMonday(){
  const d = new Date();
  d.setHours(0,0,0,0);
  const dow = d.getDay(); // 0=日, 1=月, ... 6=土
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate()+diff);
  return d;
}
// プランの起点は「今日の週が4週目」になる位置 = 今週月曜の3週間前
function getPlanStart(){
  const thisMon = getThisMonday();
  const start = new Date(thisMon);
  start.setDate(start.getDate() - 21); // 3週間前の月曜
  const stored = store.get('planStartDate',null);
  if(stored){
    const d = new Date(stored);
    d.setHours(0,0,0,0);
    if(d.getTime() !== start.getTime()){
      store.set('planStartDate', start.toISOString());
      return start;
    }
    return d;
  }
  store.set('planStartDate', start.toISOString());
  return start;
}
function getDayDate(weekIdx, dayIdx){
  const start = getPlanStart();
  const d = new Date(start);
  d.setDate(d.getDate() + (weekIdx-1)*7 + dayIdx);
  return d;
}
function fmtDate(d){ return `${d.getMonth()+1}/${d.getDate()}`; }
function isSameDate(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function isToday(d){ return isSameDate(d, new Date()); }
function findTodayIndex(){
  const today = new Date();
  for(let w=1;w<=4;w++){
    for(let d=0;d<7;d++){
      if(isSameDate(getDayDate(w,d), today)) return {w,d};
    }
  }
  return null;
}

const store = {
  get(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch{return def}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))}
};

const STATE = {
  currentWeek: store.get('currentWeek',1), // 1-4
  currentDay: store.get('currentDay',0), // 0-6
  inventory: store.get('inventory',[]), // [{name,expire,addedAt}]
  plan: store.get('plan',null), // {w1:[{main,sub,soup,feedback},...]*7, w2,...}
  filter: 'all',
  quickCat: 'お肉'
};

function save(){
  store.set('currentWeek',STATE.currentWeek);
  store.set('currentDay',STATE.currentDay);
  store.set('inventory',STATE.inventory);
  store.set('plan',STATE.plan);
}

/* ==============================
   献立自動生成
   ============================== */
function isExcluded(recipe){
  return recipe.ingredients.some(ing=>
    EXCLUDED_INGREDIENTS.some(ex=>ing.n.includes(ex))
  );
}
function invMatchCount(recipe,inv){
  return recipe.ingredients.filter(ing=>
    inv.some(x=>ing.n.includes(x)||x.includes(ing.n))
  ).length;
}

function generatePlan(opts={}){
  const inv = invHaveNames();
  const available = RECIPES.filter(r=>!isExcluded(r));
  const mains = available.filter(r=>r.category==='main');
  const subs  = available.filter(r=>r.category==='sub');
  const soups = available.filter(r=>r.category==='soup');

  // 在庫優先モード: 在庫マッチ数を強く重み付け
  const inventoryFirst = opts.inventoryFirst || inv.length>0;

  function score(recipe){
    const match = invMatchCount(recipe,inv);
    if(inventoryFirst){
      return match*10 + Math.random();
    }
    return match*0.5 + Math.random();
  }
  function pick(list,count){
    const sorted = [...list].sort((a,b)=>score(b)-score(a));
    const chosen=[];
    for(const r of sorted){
      if(chosen.length>=count)break;
      // 直近と同じ料理はスキップ、同カテゴリ(和洋中)の連続も抑制
      if(chosen.some(c=>c.id===r.id))continue;
      if(chosen.length>=1 && chosen[chosen.length-1].cuisine===r.cuisine && Math.random()<0.4)continue;
      chosen.push(r);
    }
    // 足りない場合は重複許容で埋める
    while(chosen.length<count && sorted.length){
      chosen.push(sorted[chosen.length%sorted.length]);
    }
    return chosen;
  }

  const plan={};
  for(let w=1;w<=4;w++){
    const days=[];
    const weekMains = pick(mains,7);
    const weekSubs  = pick(subs,7);
    const weekSoups = pick(soups,7);
    for(let d=0;d<7;d++){
      days.push({
        main: weekMains[d].id,
        sub:  weekSubs[d].id,
        soup: weekSoups[d].id,
        feedback:{},
        memo:'',
        extras:[]
      });
    }
    plan['w'+w]=days;
  }
  STATE.plan=plan;
  save();
}

// 在庫で3日分だけ生成（現在週の月〜水を上書き、残りは既存のまま）
function generateThreeDays(){
  const inv = invHaveNames();
  if(inv.length===0){
    alert('冷蔵庫タブで食材を登録してから実行してください');
    return;
  }
  const available = RECIPES.filter(r=>!isExcluded(r));
  const mains = available.filter(r=>r.category==='main').sort((a,b)=>invMatchCount(b,inv)-invMatchCount(a,inv));
  const subs  = available.filter(r=>r.category==='sub').sort((a,b)=>invMatchCount(b,inv)-invMatchCount(a,inv));
  const soups = available.filter(r=>r.category==='soup').sort((a,b)=>invMatchCount(b,inv)-invMatchCount(a,inv));

  const week = STATE.plan['w'+STATE.currentWeek];
  const usedMain=new Set(), usedSub=new Set(), usedSoup=new Set();
  function pickUnique(pool, used){
    for(const r of pool){ if(!used.has(r.id)){used.add(r.id); return r;} }
    return pool[0];
  }
  for(let i=0;i<3;i++){
    week[i] = {
      main: pickUnique(mains,usedMain).id,
      sub:  pickUnique(subs,usedSub).id,
      soup: pickUnique(soups,usedSoup).id,
      feedback:{}, memo:'', extras:[]
    };
  }
  save();
}

function regenDay(w,d){
  const mains = RECIPES.filter(r=>r.category==='main');

/* ==============================
   同時調理スケジューラ
   3レーン(L/S/G)に振り分け、プレップ5分シリアル+調理並列
   ============================== */
function scheduleDay(main, sub, soup){
  const PREP = 5;
  const items = [
    {...main, slot:'主菜'},
    {...sub,  slot:'副菜'},
    {...soup, slot:'汁物'}
  ];

  let L = items.filter(d=>d.tool==='hc-l');
  let S = items.filter(d=>d.tool==='hc-s');
  let G = items.filter(d=>d.tool==='stove');

  const notices = [];

  // 最適化1: HC-L枠が空で、HC-Sが2品以上 → 長い方を大鍋へ
  if(L.length===0 && S.length>=2){
    const longest = S.reduce((a,b)=>a.time>b.time?a:b);
    S = S.filter(d=>d!==longest);
    L.push({...longest, _moved:true});
    notices.push(`🔀 <b>${longest.emoji} ${longest.name}</b>を大鍋(L)へ移動（小鍋が空いて副菜を並行調理できます）`);
  }

  // 最適化2: HC-L枠に2品以上（主菜+移動品）の場合はそのまま直列、S空きを活用
  // 最適化3: HC-Sが2品（主菜がgで副菜・汁物ともhc-s）→ 短い方をガスに回すと総時間短縮
  if(S.length>=2 && G.length===0){
    const shortest = S.reduce((a,b)=>a.time<b.time?a:b);
    // If shortest is a simple soup/sub that could be stove-cooked, move it
    if(shortest.time<=15){
      S = S.filter(d=>d!==shortest);
      G.push({...shortest, _moved:true});
      notices.push(`🔀 <b>${shortest.emoji} ${shortest.name}</b>をガス調理へ（調理時間短く並行化が効率的）`);
    }
  }

  // スケジューリング: プレップは1人作業でシリアル、調理は並列
  // プレップ優先順位: 最も長い調理(大きな時間)から着手して遊ばせない
  const tracks = {L:[], S:[], G:[]};
  const allForPrep = [
    ...L.map(d=>({...d,track:'L'})),
    ...S.map(d=>({...d,track:'S'})),
    ...G.map(d=>({...d,track:'G'}))
  ].sort((a,b)=>{
    // HC(unattended)を先にプレップ、その中でも長いものから
    const pri = {L:0, S:1, G:2};
    if(pri[a.track]!==pri[b.track])return pri[a.track]-pri[b.track];
    return b.time-a.time;
  });

  let prepCursor = 0;
  const trackCookCursor = {L:0, S:0, G:0};
  allForPrep.forEach(d=>{
    const prepStart = prepCursor;
    const prepEnd = prepStart + PREP;
    prepCursor = prepEnd;
    const cookStart = Math.max(prepEnd, trackCookCursor[d.track]);
    const cookEnd = cookStart + d.time;
    trackCookCursor[d.track] = cookEnd;
    tracks[d.track].push({
      name:d.name, emoji:d.emoji, slot:d.slot,
      prepStart, prepEnd, cookStart, cookEnd,
      time:d.time, hcMode:d.hcMode||'ガス調理',
      moved:d._moved||false
    });
  });

  const total = Math.max(
    ...tracks.L.map(t=>t.cookEnd),
    ...tracks.S.map(t=>t.cookEnd),
    ...tracks.G.map(t=>t.cookEnd),
    0
  );

  // イベント列（時系列で並べて表示）
  const events = [];
  ['L','S','G'].forEach(tr=>{
    tracks[tr].forEach(t=>{
      events.push({time:t.prepStart, type:'prep', track:tr, item:t});
      if(tr!=='G')events.push({time:t.cookStart, type:'start', track:tr, item:t});
      events.push({time:t.cookEnd, type:'done', track:tr, item:t});
    });
  });
  events.sort((a,b)=>a.time-b.time || (a.type==='done'?1:-1));

  return {tracks, total, events, notices};
}

function fmtMin(m){
  const mm = Math.round(m);
  return String(mm).padStart(2,'0')+'分';
}

/* ==============================
   食材カテゴリ自動判定
   ============================== */
function guessCategory(name){
  const pats = {
    '野菜':/キャベツ|玉ねぎ|じゃがいも|にんじん|大根|ほうれん草|ピーマン|もやし|ねぎ|トマト|きゅうり|ごぼう|しょうが|にんにく|ニラ|きのこ|レタス|白菜|なす|かぼちゃ|ブロッコリー|アスパラ|れんこん|しいたけ|小松菜|水菜|豆苗|セロリ|パプリカ|オクラ/,
    '肉類':/鶏|豚|牛|ひき肉|挽き肉|ハム|ベーコン|ウインナー|ソーセージ|手羽|バラ|ロース|こま/,
    '魚介':/鮭|サバ|ぶり|エビ|イカ|タコ|アジ|マグロ|シーフード|貝|ホタテ|カニ|たら|ししゃも|じゃこ|しらす/,
    '卵・豆腐':/卵|豆腐|油揚げ|厚揚げ|がんも/,
    '乳製品':/牛乳|チーズ|ヨーグルト|バター|生クリーム/,
    '調味料':/醤油|味噌|砂糖|みりん|酒|酢|塩|こしょう|油|マヨ|ケチャップ|ソース|ルー|だし|コンソメ|鶏ガラ|ごま/,
    'その他':/ご飯|パン|麺|パスタ|うどん|そば|春雨|のり|わかめ|豆|こんにゃく|しらたき|ケーキ|お菓子|フルーツ|果物|アイス|ジュース|お茶/
  };
  for(const [k,re] of Object.entries(pats)){
    if(re.test(name))return k;
  }
  return 'その他';
}
function catIcon(c){
  return {'野菜':'🥬','肉類':'🥩','魚介':'🐟','卵・豆腐':'🥚','乳製品':'🥛','調味料':'🧂','その他':'📦'}[c]||'📦';
}

function renderSchedule(main, sub, soup){
  const sch = scheduleDay(main, sub, soup);
  const total = sch.total || 1;

  function bars(track, cls){
    return sch.tracks[track].map(t=>{
      const prepW = ((t.prepEnd-t.prepStart)/total*100).toFixed(1);
      const prepL = (t.prepStart/total*100).toFixed(1);
      const cookW = ((t.cookEnd-t.cookStart)/total*100).toFixed(1);
      const cookL = (t.cookStart/total*100).toFixed(1);
      return `
        <div class="gantt-bar gantt-prep" style="left:${prepL}%;width:${prepW}%" title="${t.name} 準備 5分">準備</div>
        <div class="gantt-bar gantt-cook-${cls}" style="left:${cookL}%;width:${cookW}%" title="${t.name} ${t.time}分">${t.emoji} ${t.name}</div>
      `;
    }).join('');
  }

  const mid = Math.round(total/2);

  const eventsHTML = sch.events.map(ev=>{
    const trackIcon = ev.track==='L'?'🍲L':ev.track==='S'?'🍲S':'🍳';
    if(ev.type==='prep'){
      return `<div class="seq-row start">
        <div class="seq-time">${fmtMin(ev.time)}</div>
        <div class="seq-icon">${ev.item.emoji}</div>
        <div class="seq-text"><b>${trackIcon}</b> ${ev.item.name} を準備・投入 <span class="seq-note">${ev.item.hcMode}</span></div>
      </div>`;
    }
    if(ev.type==='start'){
      return `<div class="seq-row">
        <div class="seq-time">${fmtMin(ev.time)}</div>
        <div class="seq-icon">▶️</div>
        <div class="seq-text"><b>${trackIcon}</b> ${ev.item.name} 調理スタート（${ev.item.time}分）</div>
      </div>`;
    }
    return `<div class="seq-row done">
      <div class="seq-time">${fmtMin(ev.time)}</div>
      <div class="seq-icon">✅</div>
      <div class="seq-text"><b>${trackIcon}</b> ${ev.item.name} 完成</div>
    </div>`;
  }).join('');

  const noticesHTML = sch.notices.length ? `
    <div class="opt-tip">
      <strong>⚡ 自動最適化</strong>
      ${sch.notices.join('<br>')}
    </div>` : '';

  const allGas = sch.tracks.L.length===0 && sch.tracks.S.length===0;
  const allHC = sch.tracks.G.length===0;
  let meta = '';
  if(allGas) meta = '今日はガス中心。ホットクックは使いません。';
  else if(allHC) meta = '今日は全品ホットクック調理。手が空いて楽チン✨';

  return `
  <details class="sim" open>
    <summary>⚡ 同時調理タイムライン <span style="color:var(--g2)">約${total}分</span></summary>

    ${noticesHTML}
    ${meta?`<div class="note" style="margin:6px 0">${meta}</div>`:''}

    <div class="gantt">
      <div class="gantt-row">
        <div class="gantt-label">🍲L<br>大鍋</div>
        <div class="gantt-track">${sch.tracks.L.length?bars('L','l'):'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gray)">なし</div>'}</div>
      </div>
      <div class="gantt-row">
        <div class="gantt-label">🍲S<br>小鍋</div>
        <div class="gantt-track">${sch.tracks.S.length?bars('S','s'):'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gray)">なし</div>'}</div>
      </div>
      <div class="gantt-row">
        <div class="gantt-label">🍳<br>ガス</div>
        <div class="gantt-track">${sch.tracks.G.length?bars('G','g'):'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gray)">なし</div>'}</div>
      </div>
      <div class="gantt-timeline">
        <span>0分</span><span>${mid}分</span><span>${total}分</span>
      </div>
      <div class="gantt-total">⏱ 合計所要時間: ${total}分</div>
    </div>

    <div class="sched-legend">
      <span class="lg"><span class="sw gantt-prep"></span>準備(5分)</span>
      <span class="lg"><span class="sw gantt-cook-l"></span>大鍋</span>
      <span class="lg"><span class="sw gantt-cook-s"></span>小鍋</span>
      <span class="lg"><span class="sw gantt-cook-g"></span>ガス</span>
    </div>

    <div class="seq">${eventsHTML}</div>
  </details>`;
}

function renderTodayBanner(){

  const todayPos = findTodayIndex();
  const viewing = (STATE.currentWeek===todayPos?.w && STATE.currentDay===todayPos?.d);
  const jumpBtn = (todayPos && !viewing)
    ? `<button class="tb-jump" id="btn-jump-today">今日へジャンプ →</button>`
    : (viewing ? `<span class="tb-jump" style="background:rgba(255,255,255,.4)">✓ 表示中</span>` : `<span class="tb-jump" style="opacity:.6">範囲外</span>`);

function renderMonthTabs(){
  const el=document.getElementById('month-tabs');
  el.innerHTML = [1,2,3,4].map(w=>{
    const start = getDayDate(w,0);
    const end = getDayDate(w,6);
    const range = `${fmtDate(start)}〜${fmtDate(end)}`;
    return `<div class="month-tab ${STATE.currentWeek===w?'active':''}" data-w="${w}">
      ${w}週目
      <div class="mt-range">${range}</div>
    </div>`;
  }).join('');
  el.querySelectorAll('.month-tab').forEach(t=>t.onclick=()=>{
    STATE.currentWeek=+t.dataset.w;save();render();
  });
}

function renderWeekTabs(){
  const el=document.getElementById('week-tabs');
  const week = STATE.plan['w'+STATE.currentWeek];
  el.innerHTML = DAYS.map((d,i)=>{
    const day = week[i];
    const main=getRecipe(day.main),sub=getRecipe(day.sub),soup=getRecipe(day.soup);
    const kcal=(main?.kcal||0)+(sub?.kcal||0)+(soup?.kcal||0);
    const date = getDayDate(STATE.currentWeek,i);
    const we = i>=5?'weekend':'';
    const ac = STATE.currentDay===i?'active':'';
    const td = isToday(date)?'today':'';
    return `<div class="week-tab ${we} ${ac} ${td}" data-d="${i}">
      <div class="date">${fmtDate(date)}</div>
      <div class="day">${d}</div>
      <div class="kcal">${kcal}</div>
    </div>`;
  }).join('');
  el.querySelectorAll('.week-tab').forEach(t=>t.onclick=()=>{
    STATE.currentDay=+t.dataset.d;save();render();
  });
}

function renderDayMeals(){
  const el=document.getElementById('day-meals');
  const day = STATE.plan['w'+STATE.currentWeek][STATE.currentDay];
  const main=getRecipe(day.main),sub=getRecipe(day.sub),soup=getRecipe(day.soup);
  const totalKcal=(main.kcal||0)+(sub.kcal||0)+(soup.kcal||0);
  const totalP=(main.p||0)+(sub.p||0)+(soup.p||0);
  const totalF=(main.f||0)+(sub.f||0)+(soup.f||0);
  const totalC=(main.c||0)+(sub.c||0)+(soup.c||0);
  const pSum=totalP*4,fSum=totalF*9,cSum=totalC*4,kSum=pSum+fSum+cSum||1;
  const we = STATE.currentDay>=5?'weekend':'';

  function toolTag(t){
    if(t==='hc-l')return '<span class="tag tag-hc-l">🍲L</span>';
    if(t==='hc-s')return '<span class="tag tag-hc-s">🍲S</span>';
    return '<span class="tag tag-hc-s" style="background:#e5e7eb;color:#6b7280">🍳</span>';
  }
  function fbBtns(slot,cur){
    const g = cur==='good'?'sel-good':'';
    const b = cur==='bad'?'sel-bad':'';
    return `<div class="fb-btns">
      <button class="fb-btn ${g}" data-slot="${slot}" data-v="good">👍完食</button>
      <button class="fb-btn ${b}" data-slot="${slot}" data-v="bad">🤔不評</button>
    </div>`;
  }

  el.innerHTML = `
  <div class="meal-card ${we}">
    <div class="meal-head">
      <span>${DAYS[STATE.currentDay]}曜日</span>
      <span>🔥${totalKcal} kcal</span>
    </div>
    <div class="meal-body">
      <div class="meal-row">
        <div class="left">
          <span class="tag tag-main">主菜</span>
          ${toolTag(main.tool)}
          <span class="meal-name">${main.emoji} ${main.name}</span>
        </div>
        <div class="meal-actions">
          <button class="icon-btn" data-recipe="${main.id}">📖</button>
          <button class="icon-btn" data-regen-slot="main">🔄</button>
        </div>
      </div>
      <div class="meal-row">
        <div class="left">
          <span class="tag tag-sub">副菜</span>
          ${toolTag(sub.tool)}
          <span class="meal-name">${sub.emoji} ${sub.name}</span>
        </div>
        <div class="meal-actions">
          <button class="icon-btn" data-recipe="${sub.id}">📖</button>
          <button class="icon-btn" data-regen-slot="sub">🔄</button>
        </div>
      </div>
      ${soup.id==='nosoup' ? '' : `<div class="meal-row">
        <div class="left">
          <span class="tag tag-soup">汁物</span>
          ${toolTag(soup.tool)}
          <span class="meal-name">${soup.emoji} ${soup.name}</span>
        </div>
        <div class="meal-actions">
          <button class="icon-btn" data-recipe="${soup.id}">📖</button>
          <button class="icon-btn" data-regen-slot="soup">🔄</button>
        </div>
      </div>`}
      <div class="bar">
        <div class="seg bp" style="width:${(pSum/kSum*100).toFixed(0)}%"></div>
        <div class="seg bf" style="width:${(fSum/kSum*100).toFixed(0)}%"></div>
        <div class="seg bc" style="width:${(cSum/kSum*100).toFixed(0)}%"></div>
      </div>
      <div class="pfc">
        <span class="p">P ${totalP}g</span>
        <span class="f">F ${totalF}g</span>
        <span class="c">C ${totalC}g</span>
      </div>

      ${renderSchedule(main,sub,soup)}

      <div style="margin-top:12px;font-size:12px;color:var(--text-sub)">今日の献立はどうでしたか？</div>
      <div class="fb-row"><span>主菜 ${main.emoji} ${main.name}</span>${fbBtns('main',day.feedback.main)}</div>
      <div class="fb-row"><span>副菜 ${sub.emoji} ${sub.name}</span>${fbBtns('sub',day.feedback.sub)}</div>
      <div class="fb-row"><span>汁物 ${soup.emoji} ${soup.name}</span>${fbBtns('soup',day.feedback.soup)}</div>

      ${renderDayMemo(day)}
    </div>
  </div>`;

  el.querySelectorAll('[data-recipe]').forEach(b=>b.onclick=()=>openRecipe(b.dataset.recipe));
  el.querySelectorAll('[data-regen-slot]').forEach(b=>b.onclick=()=>{
    const slot=b.dataset.regenSlot;
    const pool = RECIPES.filter(r=>r.category===(slot==='main'?'main':slot==='sub'?'sub':'soup'));
    day[slot] = pool[Math.floor(Math.random()*pool.length)].id;
    save();render();
  });
  el.querySelectorAll('.fb-btn').forEach(b=>b.onclick=()=>{
    day.feedback[b.dataset.slot] = b.dataset.v;
    save();render();
  });

  // Day memo / extras events
  const memoInp = el.querySelector('.memo-input');
  if(memoInp){
    memoInp.addEventListener('input',e=>{day.memo=e.target.value;save()});
    memoInp.addEventListener('blur',()=>render());
  }
  el.querySelectorAll('.extra-chip .x').forEach(x=>x.onclick=e=>{
    e.stopPropagation();
    day.extras.splice(+x.dataset.i,1);save();render();
  });
  const addBtn = el.querySelector('.extra-add-btn');
  if(addBtn){
    const nInp = el.querySelector('.extra-add .n-inp');
    const aInp = el.querySelector('.extra-add .a-inp');
    const doAdd = ()=>{
      const n = nInp.value.trim();
      if(!n)return;
      const a = aInp.value.trim()||'適量';
      day.extras.push({n, a, c: guessCategory(n)});
      nInp.value='';aInp.value='';save();render();
      setTimeout(()=>el.querySelector('.extra-add .n-inp')?.focus(),50);
    };
    addBtn.onclick = doAdd;
    nInp.addEventListener('keypress',e=>{if(e.key==='Enter')doAdd()});
    aInp.addEventListener('keypress',e=>{if(e.key==='Enter')doAdd()});
  }
}

/* ==============================
   冷蔵庫
   ============================== */
function daysLeft(dateStr){
  if(!dateStr)return null;
  const d = new Date(dateStr);
  const today = new Date();
  today.setHours(0,0,0,0);d.setHours(0,0,0,0);
  return Math.round((d-today)/86400000);
}

/* 在庫: カテゴリ + 数量 + 補充フラグ */
const INV_CATEGORIES = ['野菜・きのこ','肉・魚','卵・豆腐','乳製品','調味料','その他'];
const INV_CAT_ICONS = {'野菜・きのこ':'🥬','肉・魚':'🥩','卵・豆腐':'🥚','乳製品':'🥛','調味料':'🧂','その他':'📦'};

function inferCategory(name){
  const meat = ['豚','鶏','牛','合いびき','合い挽き','ひき肉','ハム','ベーコン','ウインナー','ソーセージ','鮭','サバ','さば','ぶり','ブリ','しらす','エビ','えび','あさり','イカ','いか','タラ','たら','まぐろ','マグロ'];
  const egg = ['卵','たまご','豆腐','油揚げ','厚揚げ','納豆','がんも'];
  const milk = ['牛乳','バター','チーズ','ヨーグルト','生クリーム'];
  const seasoning = ['醤油','味噌','みりん','砂糖','塩','酢','ケチャップ','マヨネーズ','だし','油','こしょう','カレー粉','オイスター','片栗粉','コンソメ','ソース'];
  const other = ['米','パスタ','うどん','そば','春雨','缶','乾燥','パン','小麦粉'];
  const veg = ['キャベツ','玉ねぎ','たまねぎ','じゃがいも','にんじん','大根','ほうれん草','小松菜','ピーマン','もやし','長ねぎ','白ネギ','ねぎ','トマト','きゅうり','レタス','ごぼう','しょうが','にんにく','ニラ','えのき','しめじ','しいたけ','まいたけ','なす','かぼちゃ','ブロッコリー','アスパラ','タケノコ','たけのこ','ふき','さつまいも'];
  if(seasoning.some(s=>name.includes(s))) return '調味料';
  if(milk.some(s=>name.includes(s))) return '乳製品';
  if(egg.some(s=>name.includes(s))) return '卵・豆腐';
  if(meat.some(s=>name.includes(s))) return '肉・魚';
  if(other.some(s=>name.includes(s))) return 'その他';
  if(veg.some(s=>name.includes(s))) return '野菜・きのこ';
  return 'その他';
}

function defaultUnit(name, cat){
  // 肉類はグラム単位（魚・しらす・エビ等は個のまま）
  // "牛乳"は個数扱いにするので、肉マッチは「牛乳」を除外する
  if(/豚|鶏|ひき肉|合いびき|ミンチ|ベーコン|ハム|ウインナー|ソーセージ/.test(name)) return {unit:'g', step:100};
  if(/^牛(?!乳)|牛肉|牛こま|牛バラ|牛ロース|牛切り落とし/.test(name)) return {unit:'g', step:100};
  // バターはグラム単位（10g刻み）
  if(/バター/.test(name)) return {unit:'g', step:10};
  if(/生クリーム/.test(name)) return {unit:'ml', step:200};
  return {unit:'個', step:1};
}
function normalizeInv(){
  STATE.inventory.forEach(it=>{
    // 旧スキーマ（location/status）からの移行
    if(it.status && it.qty===undefined){
      it.qty = it.status==='none' ? 0 : 1;
      it.refill = it.status==='low';
      delete it.status;
      delete it.location;
    }
    if(!it.category) it.category = inferCategory(it.name);
    const d = defaultUnit(it.name, it.category);
    // 単位が現在のデフォルトと違う場合は移行する
    if(it.unit && it.unit!==d.unit){
      if(it.unit==='g' && d.unit==='個'){
        // 誤って魚類等がgになっていた → 個に戻す
        it.qty = Math.max(1, Math.round((it.qty||100)/100));
      } else if(it.unit==='ml' && d.unit==='個'){
        // 牛乳などをmlから個に戻す
        it.qty = Math.max(1, Math.round((it.qty||200)/200));
      } else if(it.unit==='個' && d.unit==='g'){
        // バターなどを個からgに移行（1個＝標準サイズ、バターは200g）
        it.qty = /バター/.test(it.name) ? (it.qty||1)*200 : (it.qty||1)*d.step;
      } else if(it.unit==='個' && d.unit==='ml'){
        it.qty = (it.qty||1)*d.step;
      }
      it.unit = d.unit;
      it.step = d.step;
    }
    if(!it.unit) it.unit = d.unit;
    if(!it.step) it.step = d.step;
    // 旧「個」データを肉はgに移行: qty=1 → qty=100g(1切れ相当)
    if(it.unit==='g' && it.qty!==undefined && it.qty<=5 && !/バター/.test(it.name)) it.qty = it.qty*100;
    if(it.unit==='ml' && it.qty!==undefined && it.qty<=5) it.qty = it.qty*200;
    if(it.qty===undefined) it.qty = it.step;
    if(it.refill===undefined) it.refill = false;
  });
}
function invHaveNames(){
  normalizeInv();
  return STATE.inventory.filter(i=>i.qty>=1).map(i=>i.name);
}

  '肉・魚':['豚こま','豚バラ','豚ロース','鶏もも','鶏むね','合いびき肉','鮭','冷凍鮭','ぶり','ベーコン','ウインナー','しらす'],

  const grouped={};
  INV_CATEGORIES.forEach(c=>grouped[c]=[]);
  items.forEach(({it,i})=>{
    const c = INV_CATEGORIES.includes(it.category) ? it.category : 'その他';
    grouped[c].push({it,i});
  });

  const totalCount = STATE.inventory.length;
  const lowCount = STATE.inventory.filter(x=>x.qty===0||x.refill).length;

  el.innerHTML = `
    <div class="inv-search">
      <input type="text" id="inv-search-input" placeholder="🔍 食材を検索..." value="${STATE.invSearch||''}">
    </div>
    <div class="inv-summary">
      <span>📦 登録 ${totalCount}品</span>
      <span style="color:var(--o2)">🛒 買い足し ${lowCount}品</span>
    </div>
    ${INV_CATEGORIES.map(cat=>{
      if(grouped[cat].length===0) return '';
      return `
        <div class="cat-group">
          <div class="cat-head">${INV_CAT_ICONS[cat]} ${cat} <span class="cat-count">(${grouped[cat].length}品)</span></div>
          <div class="inv-cards">
            ${grouped[cat].map(({it,i})=>`
              <div class="inv-card ${it.qty===0?'qty-zero':''} ${it.refill?'refill-on':''}" data-i="${i}">
                <button class="inv-del" data-x="${i}" aria-label="削除">×</button>
                <div class="inv-name">${it.name}</div>
                <div class="inv-qty">${it.qty}${it.unit && it.unit!=='個'?`<span style="font-size:14px;font-weight:600;margin-left:2px">${it.unit}</span>`:''}</div>
                <div class="inv-pm">
                  <button class="pm-btn pm-minus" data-m="${i}">−</button>
                  <button class="pm-btn pm-plus" data-p="${i}">＋</button>
                </div>
                <button class="inv-refill ${it.refill?'on':''}" data-r="${i}">${it.refill?'✓ 補充済':'補充'}</button>
              </div>
            `).join('')}
          </div>
        </div>`;
    }).join('')}

      <div class="cat-head">＋ 追加</div>
      <div class="input-row">
        <input id="inv-input" placeholder="食材名（カンマ区切り可）">
        <select id="inv-cat-sel">
          ${INV_CATEGORIES.map(c=>`<option value="${c}">${INV_CAT_ICONS[c]} ${c}</option>`).join('')}
        </select>
        <button id="inv-add">追加</button>
      </div>
      <div class="quick-title">💡 よく使う食材（タップで追加）</div>
      <div class="quick-items-inv" id="quick-items-inv"></div>
    </div>
  `;

  // 検索
  const si = document.getElementById('inv-search-input');
  si.oninput = e=>{ STATE.invSearch = e.target.value; renderInventory(); };

  // カード操作
  el.querySelectorAll('.pm-plus').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.p; const it=STATE.inventory[i]; it.qty += (it.step||1); if(it.qty>=1) it.refill=false; save();render();
  });
  el.querySelectorAll('.pm-minus').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.m; const it=STATE.inventory[i]; it.qty=Math.max(0, it.qty - (it.step||1)); save();render();

  });

function addInvFromInput(){
  const inp=document.getElementById('inv-input');
  const sel=document.getElementById('inv-cat-sel');
  const v=inp.value.trim();if(!v)return;
  v.split(/[、,]/).map(s=>s.trim()).filter(Boolean).forEach(name=>{
    const existing = STATE.inventory.find(i=>i.name===name);
    if(existing){ existing.qty += (existing.step||1); existing.refill=false; }
    else {
      const cat = sel.value||inferCategory(name);
      const d = defaultUnit(name, cat);
      STATE.inventory.push({name,category:cat,qty:d.step,unit:d.unit,step:d.step,refill:false,addedAt:new Date().toISOString()});
    }
  });
  inp.value='';save();render();
}

}

function renderShopList(){
  const el=document.getElementById('shop-list');
  const week=STATE.plan['w'+STATE.currentWeek];
  const tally={}; // レシピ由来の食材集計
  const extrasByCat={}; // 日付タグ付きの追加食材
  week.forEach((day,di)=>{
    [day.main,day.sub,day.soup].forEach(id=>{
      const r=getRecipe(id);
      r.ingredients.forEach(ing=>{
        const key=ing.n;
        if(!tally[key])tally[key]={n:ing.n,amounts:[],c:ing.c};
        tally[key].amounts.push(ing.a);
      });
    });
    (day.extras||[]).forEach(ex=>{
      const cat = ex.c || guessCategory(ex.n);
      if(!extrasByCat[cat])extrasByCat[cat]=[];
      extrasByCat[cat].push({n:ex.n, a:ex.a, day:DAYS[di]});
    });
  });
  const invNames=invHaveNames();
  const byCat={};
  Object.values(tally).forEach(item=>{
    if(!byCat[item.c])byCat[item.c]=[];
    byCat[item.c].push(item);
  });
  const order=['野菜','肉類','魚介','卵・豆腐','乳製品','調味料','その他'];
  const allCats = new Set([...order, ...Object.keys(byCat), ...Object.keys(extrasByCat)]);
  const orderedCats = order.filter(c=>allCats.has(c) && (byCat[c]||extrasByCat[c]));

  const hasAnyExtra = Object.keys(extrasByCat).length>0;

  // 在庫で「買い足し」フラグ or 数量ゼロのアイテム
  const refillItems = STATE.inventory.filter(it=>it.qty===0||it.refill);

  el.innerHTML = orderedCats.map(c=>{
    const normalItems = (byCat[c]||[]).map(item=>{
      const have=invNames.some(n=>item.n.includes(n)||n.includes(item.n));
      return `<div class="shop-item ${have?'have':''}">
        <span>${have?'✓ ':''}${item.n}</span>
        <span class="amt">${[...new Set(item.amounts)].join(', ')}</span>
      </div>`;
    }).join('');
    const extraItems = (extrasByCat[c]||[]).map(item=>{
      return `<div class="shop-item extra-item">
        <span><span class="day-badge">${item.day}</span>${item.n}</span>
        <span class="amt">${item.a}</span>
      </div>`;
    }).join('');
    return `
    <div class="shop-cat">
      <h3>${catIcon(c)} ${c}</h3>
      ${normalItems}
      ${extraItems?`<div class="shop-section-title">⭐ 特別食材（日付指定）</div>${extraItems}`:''}
    </div>`;
  }).join('') || '<div class="empty">献立がありません</div>';

  if(refillItems.length){
    const refillHtml = `
    <div class="shop-cat" style="border:2px solid var(--o);background:#fff7ed">
      <h3>🛒 在庫の買い足し（${refillItems.length}品）</h3>
      ${refillItems.map(it=>`<div class="shop-item"><span>${it.qty===0?'🔴':'🟡'} ${it.name}</span><span class="amt">${it.qty===0?'切らした':'補充'}</span></div>`).join('')}
    </div>`;
    el.innerHTML = refillHtml + el.innerHTML;
  }

  if(hasAnyExtra){
    el.innerHTML = `<div class="note" style="margin-bottom:10px;background:var(--o-light);padding:8px 10px;border-radius:8px;color:#78350f">⭐ 特別食材: ${Object.values(extrasByCat).flat().length}品（日付タグ付き）</div>` + el.innerHTML;
  }
}

function buildShopText(){
  const week=STATE.plan['w'+STATE.currentWeek];
  const tally={};
  const extras=[];
  week.forEach((day,di)=>{
    [day.main,day.sub,day.soup].forEach(id=>{
      const r=getRecipe(id);
      r.ingredients.forEach(ing=>{
        if(!tally[ing.n])tally[ing.n]=[];
        tally[ing.n].push(ing.a);
      });
    });
    (day.extras||[]).forEach(ex=>extras.push({...ex,day:DAYS[di]}));
  });
  const invNames=invHaveNames();
  const refillItems = STATE.inventory.filter(it=>it.qty===0||it.refill);
  let text=`🛒 ${STATE.currentWeek}週目の買い物リスト\n\n【通常食材】\n`+
    Object.entries(tally).filter(([n])=>!invNames.some(x=>n.includes(x)||x.includes(n)))
      .map(([n,a])=>`□ ${n} (${[...new Set(a)].join(', ')})`).join('\n');
  if(refillItems.length){
    text += `\n\n【🛒 在庫の買い足し】\n` +
      refillItems.map(it=>`□ ${it.name} ${it.qty===0?'(切らした)':'(補充)'}`).join('\n');
  }
  if(extras.length){
    text += `\n\n【⭐ 特別食材（日付指定）】\n` +
      extras.map(e=>`□ [${e.day}] ${e.n} (${e.a})`).join('\n');
  }
  const memos = week.map((d,i)=>d.memo?`・${DAYS[i]}: ${d.memo}`:null).filter(Boolean);
  if(memos.length){
    text += `\n\n【📝 日ごとのメモ】\n` + memos.join('\n');
  }
  return text;
}

document.getElementById('btn-copy-shop').onclick=()=>{
  navigator.clipboard.writeText(buildShopText()).then(()=>alert('コピーしました！'));
};

document.getElementById('btn-share-shop').onclick=async()=>{
  const text = buildShopText();
  if(navigator.share){
    try{
      await navigator.share({title:'買い物リスト', text});
    }catch(e){/* canceled */}
  }else{
    navigator.clipboard.writeText(text).then(()=>alert('共有機能が使えないためコピーしました。LINE等に貼り付けてください。'));
  }
};

// Service Worker登録（PWA/オフライン対応）＋自動更新
if('serviceWorker' in navigator){
  window.addEventListener('load', async ()=>{
    try {
      const reg = await navigator.serviceWorker.register('./sw.js');
      // 新しいSWが見つかったら取得 → activate → 自動リロード
      reg.addEventListener('updatefound', ()=>{
        const nw = reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange', ()=>{
          if(nw.state==='activated'){
            // 既にコントローラが居る場合のみリロード（初回インストールは除く）
            if(navigator.serviceWorker.controller){
              setTimeout(()=>location.reload(), 300);
            }
          }
        });
      });
      // 起動ごとに更新チェック
      reg.update().catch(()=>{});
    } catch(e){}
  });
}

  if(confirm('今週の献立を作り直しますか？'))
    {generatePlan();render();}
};
document.getElementById('btn-3days').onclick=()=>{
  if(confirm('冷蔵庫の食材を優先して月〜水の3日分を作成します。よろしいですか？'))
    {generateThreeDays();STATE.currentDay=0;save();render();}
};

/* ==============================
   初期化
   ============================== */
if(!store.get('seed_2026_04_23_v6',false)){
  // 既存アイテムを場所＋ステータス形式に移行
  STATE.inventory.forEach(it=>{
    if(!it.location) it.location = inferLocation(it.name);
    if(!it.status) it.status = 'have';
  });
  const seed = [
    'きゅうり','レタス','豆腐','タケノコ',
    'ごぼう','もやし','玉ねぎ','じゃがいも','にんじん','キャベツ','白ネギ','小松菜','えのき',
    '豚肉','合いびき肉','冷凍鮭',
    '牛乳','バター','納豆','しらす',
    '醤油','味噌','みりん','砂糖','塩'
  ];
  const now = new Date().toISOString();
  seed.forEach(n=>{
    if(!STATE.inventory.some(x=>x.name===n)){
      STATE.inventory.push({name:n, location:inferLocation(n), status:'have', addedAt:now});
    }
  });
  store.set('inventory', STATE.inventory);
  if(!STATE.plan) generatePlan();
  // 在庫ベースで1週目を厳選献立に差し替え（カレー日は汁物なし・和洋中バランス）
  const curated = [
    {main:'shake-mune',     sub:'coleslaw',      soup:'minestrone'},    // 月 洋（魚は週1・買い物直後）
    {main:'buta-shogayaki', sub:'wakatake-ni',   soup:'kenchin'},       // 火 和（筍）
    {main:'tofu-steak',     sub:'moyashi-namul', soup:'tonjiru'},       // 水 和
    {main:'keema',          sub:'haruharu',      soup:'nosoup'},        // 木 カレー
    {main:'teriyaki',       sub:'chikuzenni',    soup:'asari-miso'},    // 金 和（筍）
    {main:'napolitan',      sub:'macaroni-salad',soup:'kabocha-soup'},  // 土 洋
    {main:'chinjao',        sub:'tofu-hiya',     soup:'wakame-soup'},   // 日 中（筍・豚肉）
  ];
  STATE.plan['w1'] = curated.map(c=>({...c, feedback:{}, memo:'', extras:[]}));
  save();
  store.set('seed_2026_04_23_v6', true);
}
if(!STATE.plan) generatePlan();
// バター復活（誤削除対応・1回のみ）
if(!store.get('restore_butter_v1',false)){
  if(!STATE.inventory.some(x=>x.name==='バター')){
    STATE.inventory.push({name:'バター', category:'乳製品', qty:200, unit:'g', step:10, refill:false, addedAt:new Date().toISOString()});
    store.set('inventory', STATE.inventory);
  }
  store.set('restore_butter_v1', true);
}
if(!store.get('jumpedToToday',false)){
  const tp = findTodayIndex();
  if(tp){ STATE.currentWeek = tp.w; STATE.currentDay = tp.d; save(); }
  store.set('jumpedToToday', true);
}
render();
</script>
